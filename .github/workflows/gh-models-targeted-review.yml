name: GH Models Targeted Review

# Single-shot LLM via GitHub Models. Cannot run tests. Produces a
# mapping from changed files to relevant numba.tests modules, plus
# the exact runtests command a maintainer can run locally.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gh-models-targeted-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute PR diff
        run: |
          git diff "origin/${{ github.base_ref }}...HEAD" > /tmp/pr.diff
          git diff "origin/${{ github.base_ref }}...HEAD" --name-only > /tmp/pr.files
          # Truncate to keep prompt within model context.
          head -c 80000 /tmp/pr.diff > /tmp/pr.diff.trim
          mv /tmp/pr.diff.trim /tmp/pr.diff

      - name: List candidate test modules
        run: |
          # The set of test files the model can choose from.
          ls numba/tests/test_*.py > /tmp/test_modules.txt
          wc -l /tmp/test_modules.txt

      - name: Build prompt
        run: |
          cat > /tmp/prompt.txt <<'PROMPT_EOF'
          You are reviewing a numba PR. Numba is a JIT compiler for
          Python+NumPy.

          Context you have:
          - Changed files (one per line):
          PROMPT_EOF
          echo '```' >> /tmp/prompt.txt
          cat /tmp/pr.files >> /tmp/prompt.txt
          echo '```' >> /tmp/prompt.txt

          cat >> /tmp/prompt.txt <<'PROMPT_EOF'

          - Available test modules under numba/tests/ (filenames):
          PROMPT_EOF
          echo '```' >> /tmp/prompt.txt
          cat /tmp/test_modules.txt >> /tmp/prompt.txt
          echo '```' >> /tmp/prompt.txt

          cat >> /tmp/prompt.txt <<'PROMPT_EOF'

          - Unified diff:
          PROMPT_EOF
          echo '```diff' >> /tmp/prompt.txt
          cat /tmp/pr.diff >> /tmp/prompt.txt
          echo '```' >> /tmp/prompt.txt

          cat >> /tmp/prompt.txt <<'PROMPT_EOF'

          Output a single markdown document with this exact shape. No
          prose outside the sections.

          # GH Models targeted review of PR #__PR__

          ## Step 1 — Changed source
          List files outside numba/tests/ that are part of the importable
          package (numba/**.py, numba/**.pyx). Skip docs/, benchmarks/,
          examples/, .github/.

          ## Step 2 — Test mapping
          For each changed source file, pick test modules from the list
          above that exercise it. Reasoning rules, in priority order:
            1. Filename-stem match (typeof.py → test_typeof.py if it exists).
            2. Module path: tests that import the changed module's package.
            3. Symbol semantics: tests whose names obviously cover the
               feature changed (e.g. dictionary/list changes → test_dictobject,
               test_listobject).
          If no plausible test exists for a file, say so explicitly.
          Output a markdown table:
          | changed file | relevant test modules | reason |

          ## Step 3 — Recommended command
          A single runtests invocation a maintainer can run locally:
          ```
          python -m numba.runtests -b -v -m 2 -- <space-separated dotted test modules>
          ```
          Use the union of the test modules from Step 2, deduped.
          If Step 2 produced no mappings, output:
          ```
          # No targeted tests identifiable from the diff alone.
          # Recommend: full sharded run (existing CI).
          ```

          ## Step 4 — Verdict
          - INFO if mappings were produced.
          - WARN if zero mappings (changes don't obviously map to any test).
          One sentence justification.

          PROMPT_EOF
          sed -i "s/__PR__/${{ github.event.pull_request.number }}/" /tmp/prompt.txt

      - name: Run GH Models inference
        id: inference
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o
          prompt-file: /tmp/prompt.txt
          max-tokens: 3000

      - name: Save review markdown
        run: |
          printf '%s\n' "${{ steps.inference.outputs.response }}" > /tmp/review.md
          cat /tmp/review.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload review markdown
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gh-models-targeted-review-pr-${{ github.event.pull_request.number }}
          path: |
            /tmp/review.md
            /tmp/prompt.txt
            /tmp/pr.diff
            /tmp/pr.files
          retention-days: 14
          if-no-files-found: warn
