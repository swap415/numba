name: Claude Bench Compare

# Compiles numba twice (base SHA and head SHA), runs a microbenchmark on
# each, reports delta. Gated on the `bench` label or workflow_dispatch
# because each run does two full builds.

on:
  pull_request:
    types: [labeled, synchronize]
  workflow_dispatch:

jobs:
  bench-compare:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'bench')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      pull-requests: read
      id-token: write

    steps:
      - name: Checkout HEAD
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: head

      - name: Checkout BASE
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Compute PR diff
        run: |
          cd head
          git diff "origin/${{ github.base_ref }}...HEAD" > /tmp/pr.diff
          git diff "origin/${{ github.base_ref }}...HEAD" --name-only > /tmp/pr.files

      - name: Install miniconda
        run: head/buildscripts/incremental/install_miniconda.sh

      - name: Setup conda envs (base + head)
        env:
          PYTHON: '3.11'
          NUMPY: '1.26'
        run: |
          export PATH=$HOME/miniconda3/bin:$PATH
          source $HOME/miniconda3/etc/profile.d/conda.sh
          for variant in base head; do
            CONDA_ENV="numba_$variant"
            export CONDA_ENV
            cd $variant
            buildscripts/incremental/setup_conda_environment.sh
            cd ..
          done

      - name: Build base
        env:
          CONDA_ENV: numba_base
        run: |
          export PATH=$HOME/miniconda3/bin:$PATH
          source $HOME/miniconda3/etc/profile.d/conda.sh
          conda activate numba_base
          cd base
          buildscripts/incremental/build.sh

      - name: Build head
        env:
          CONDA_ENV: numba_head
        run: |
          export PATH=$HOME/miniconda3/bin:$PATH
          source $HOME/miniconda3/etc/profile.d/conda.sh
          conda activate numba_head
          cd head
          buildscripts/incremental/build.sh

      - name: Run Claude bench compare
        id: claude
        uses: anthropics/claude-code-base-action@beta
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_tools: "View,GlobTool,GrepTool,Write,Bash(git:*),Bash(grep:*),Bash(python:*),Bash(cat:*),Bash(ls:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(conda:*),Bash(source:*),Bash(env:*)"
          prompt: |
            You are evaluating perf impact of a numba PR. Two checkouts are
            built and ready:
              base/  — base SHA, conda env: numba_base
              head/  — head SHA, conda env: numba_head
            Each env has its own python that imports its own numba build.
            Use the full path to each env's python:
              $HOME/miniconda3/envs/numba_base/bin/python
              $HOME/miniconda3/envs/numba_head/bin/python

            All output goes to /tmp/review.md. Do NOT post any PR comments.

            # Bench compare for PR #${{ github.event.pull_request.number }}

            ## Step 1 — Identify perf-sensitive changes
            From /tmp/pr.files, list files in numba/core/, numba/np/,
            numba/typed/, numba/typing/, numba/cuda/ that affect compile
            paths or runtime hot loops. Skip docs/tests/utility-only changes.
            If none qualify, write "No perf-sensitive changes" and stop with
            verdict PASS.

            ## Step 2 — Write a microbenchmark
            Write /tmp/bench.py — under 40 lines. Constraints:
              - Uses @njit (or @vectorize / @prange if relevant to the diff)
              - Operates on NumPy arrays only — no Python objects
              - One warm-up call (triggers compile), then timed loop
              - Reports best-of-5 wall-time in ms
              - Prints exactly: "RESULT median_ms=<float> stdev_ms=<float> n=5"
            Pick the workload to exercise the code path you identified in
            Step 1. Be specific in a comment at the top of bench.py about
            which symbol from the diff this stresses.

            ## Step 3 — Run base vs head
            For each variant, run:
              <env_python> /tmp/bench.py
            Capture stdout. Re-run if stdev > 10% of median (cold cache).

            ## Step 4 — Report
            ### Benchmark
            ```
            <full contents of /tmp/bench.py>
            ```

            ### Results
            | variant | median (ms) | stdev (ms) | n |
            |---|---|---|---|
            | base | ... | ... | 5 |
            | head | ... | ... | 5 |

            ### Delta
            head/base ratio: <X>x. Significant if |ratio - 1| > 3 * (stdev_head + stdev_base) / median_base.

            ## Verdict
            - PASS if not significant, or significantly faster (ratio < 1).
            - WARN if significantly slower by < 10%.
            - FAIL if significantly slower by >= 10%.
            One sentence justification.

      - name: Publish review to step summary
        if: always()
        run: |
          if [ -s /tmp/review.md ]; then
            cat /tmp/review.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload bench report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-bench-pr-${{ github.event.pull_request.number }}
          path: |
            /tmp/review.md
            /tmp/bench.py
            /tmp/pr.diff
            /tmp/pr.files
            ${{ steps.claude.outputs.execution_file }}
          retention-days: 30
          if-no-files-found: warn
